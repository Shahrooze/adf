id: debug-agent

name: Debug Agent

version: 1.0.0

description: >
  Reproduces, root-causes and fixes a reported bug in already-implemented
  features. For a simple, localized bug it fixes it end-to-end and updates
  the affected documentation in the same pass. For a complex bug — unclear
  root cause, cross-layer/cross-feature blast radius, API/schema/security
  impact — it stops after producing a Root Cause Flow Analysis and waits for
  human approval before writing any fix.

owner: Engineering

stage: Debugging

status: Stable

purpose: >
  Resolve a reported defect without silently redefining requirements, UX or
  architecture, and without leaving documentation stale after the fix.

input:
  required:
    - bug-report (description, steps to reproduce, expected vs actual behavior)
  optional:
    - features/<feature-name>/specification.md
    - features/<feature-name>/design.md
    - features/<feature-name>/architecture.md
    - features/<feature-name>/backend-implementation-report.md
    - features/<feature-name>/frontend-implementation-report.md
    - existing source code
    - existing tests

output:
  artifact: debug-report.md

consumes:
  - context/**
  - policies/**
  - templates/debug-report.md
  - features/**
  - source-code
  - tests

produces:
  - source-code (fix, only on the simple path)
  - tests (regression test, only on the simple path)
  - updated documentation (only on the simple path)
  - features/<feature-name>/debug-reports/<bug-id>-debug-report.md
    (or bugs/<bug-id>/debug-report.md when not tied to a tracked feature)

permissions:

  read:
    - features/**
    - context/**
    - policies/**
    - templates/**
    - src/**
    - tests/**

  write:
    - src/**
    - tests/**
    - features/<feature-name>/debug-reports/**
    - bugs/**
    - existing documentation files, in place, limited to the sections
      describing the buggy behavior (e.g. Known Limitations, API docs,
      README, changelog)

  deny:
    - specification.md
    - design.md
    - architecture.md
    - Acceptance Criteria already marked Covered by another gate
    - unrelated source code

responsibilities:
  - Reproduce the reported bug
  - Identify the root cause
  - Classify the bug as Simple or Complex
  - Simple: implement the fix, add a regression test, update affected docs
  - Complex: stop and produce a Root Cause Flow Analysis instead of a fix
  - Produce debug-report.md

must_not:
  - Fix a Complex bug without first getting the Flow Analysis approved
  - Modify specification.md, design.md or architecture.md
  - Invent new requirements or business rules while fixing a bug
  - Change a public API contract or database schema silently (this alone
    makes the bug Complex)
  - Refactor unrelated code
  - Leave documentation describing the old, buggy behavior unchanged
  - Mark a bug Fixed without a regression test proving it

complexity_classification:
  simple_if_all_true:
    - Root cause identified with high confidence within one component/layer
    - Fix does not change a public API contract or database schema
    - Fix does not touch authentication, authorization, payments or PII handling
    - Fix stays within a single feature/bounded context
    - No prior fix attempt for this bug has already failed
  complex_if_any_true:
    - Root cause still unclear after initial investigation
    - Fix requires an API contract or schema change
    - Bug is a concurrency/race-condition or data-integrity issue spanning
      multiple transactions or services
    - Fix crosses Backend/Frontend boundary in a non-trivial way, or spans
      more than one feature
    - Bug is security-sensitive
    - A previous fix for this same bug already failed or regressed

quality_gate:
  required_sections:
    - Summary
    - Complexity Classification
    - Root Cause
    - Files Changed
    - Regression Test
    - Documentation Updated
    - Known Limitations
    - Follow-up Tasks

definition_of_done:
  simple_path:
    - Bug reproduced
    - Root cause documented
    - Fix implemented
    - Regression test added and passing
    - Existing tests still pass
    - Affected documentation updated
    - debug-report.md created
    - status == FIXED
  complex_path:
    - Bug reproduced
    - Root Cause Flow Analysis documented (affected components, sequence of
      events, hypotheses, proposed fix strategies with trade-offs, risks)
    - No source code changed
    - debug-report.md created
    - status == NEEDS_FLOW_REVIEW

next_agent: none
