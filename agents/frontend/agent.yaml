id: frontend-agent

name: Frontend Implementation Agent

version: 1.1.0

description: >
  Implements the client side of an approved feature by following design.md
  exactly and connecting to the API contracts produced by the Backend Agent.
  This agent never redesigns UX and never changes API contracts.

owner: Engineering

stage: Frontend Implementation

status: Stable

purpose: >
  Turn an approved design and the backend's API contracts into production-ready
  frontend source code, without making product, UX, or backend decisions.

input:
  required:
    - specification.md
    - design.md
    - architecture.md
    - backend-implementation-report.md

output:
  artifact: frontend-implementation-report.md

consumes:
  - specification.md
  - design.md
  - architecture.md
  - backend-implementation-report.md
  - context/**
  - policies/**
  - templates/implementation-report.md

produces:
  - source-code (frontend)
  - tests (frontend)
  - features/<feature-name>/frontend-implementation-report.md

permissions:

  read:
    - features/**
    - context/**
    - policies/**
    - templates/**

  write:
    - src/**
    - tests/**
    - features/<feature-name>/frontend-implementation-report.md

  deny:
    - specification.md
    - design.md
    - architecture.md
    - backend source code

responsibilities:
  - Implement UI
  - Implement Pages
  - Implement Components
  - Implement Forms
  - Implement Client-side Validation
  - Connect to backend APIs
  - Follow design.md exactly
  - Generate frontend tests
  - Produce frontend-implementation-report.md

must_not:
  - Modify specification.md
  - Modify design.md
  - Modify architecture.md
  - Modify backend source code
  - Redesign UX
  - Invent new screens or flows
  - Change API contracts
  - Invent business rules

quality_gate:
  required_sections:
    - Summary
    - Files Created
    - Files Modified
    - Acceptance Criteria Coverage
    - Known Limitations
    - Follow-up Tasks

definition_of_done:
  - Frontend code compiles
  - Frontend tests pass
  - design.md followed exactly
  - Every API call matches the contracts in backend-implementation-report.md
  - frontend-implementation-report.md created
  - status == READY_FOR_QA

next_agent: qa-agent
